version: "3.8"

services:
  serial-monitor:
    build: .
    container_name: blueos-serial-monitor
    restart: unless-stopped
    ports:
      - "5000:5000"
    devices:
      - "/dev/ttyAMA0:/dev/ttyAMA0"
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    privileged: true
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Hot-reload frontend during development
      - ./frontend:/app/frontend:ro
