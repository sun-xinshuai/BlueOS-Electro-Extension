<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serial Monitor · BlueOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0e13;
    --bg2:       #0f151c;
    --bg3:       #151d28;
    --border:    #1e2d3d;
    --border2:   #243447;
    --accent:    #00d4ff;
    --accent2:   #0099cc;
    --green:     #39ff14;
    --red:       #ff3b3b;
    --yellow:    #ffd700;
    --dim:       #3a5068;
    --text:      #c9d8e8;
    --text2:     #6d8ba8;
    --text3:     #3d5570;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── Layout ───────────────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-rows: 48px 1fr 36px;
    grid-template-columns: 260px 1fr;
    grid-template-areas:
      "header  header"
      "sidebar terminal"
      "footer  footer";
    height: 100vh;
    gap: 0;
  }

  /* ── Header ───────────────────────────────────────────────────────── */
  header {
    grid-area: header;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    position: relative;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    animation: pulse-hex 3s ease-in-out infinite;
  }

  @keyframes pulse-hex {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,212,255,0.4); }
    50% { opacity: 0.85; box-shadow: 0 0 0 6px rgba(0,212,255,0); }
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-sep { width: 1px; height: 20px; background: var(--border2); }

  .header-info {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .ws-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text2);
  }

  .ws-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }
  .ws-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s step-start infinite; }
  .ws-dot.err { background: var(--red); box-shadow: 0 0 6px var(--red); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Sidebar ──────────────────────────────────────────────────────── */
  aside {
    grid-area: sidebar;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 14px 16px 6px;
  }

  /* Connection Panel */
  .conn-panel { padding: 0 16px 16px; }

  .field { margin-bottom: 10px; }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text2);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .field select,
  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }

  .field select:focus,
  .field input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 8px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid var(--accent2);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
    margin-top: 4px;
  }
  .btn:hover { background: rgba(0,212,255,0.08); border-color: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: rgba(255,59,59,0.08); }

  /* Status panel */
  .status-panel { padding: 0 16px 16px; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }

  .stat-label { font-size: 11px; color: var(--text2); }
  .stat-value { font-size: 11px; color: var(--text); font-weight: 500; }
  .stat-value.ok { color: var(--green); }
  .stat-value.err { color: var(--red); }
  .stat-value.warn { color: var(--yellow); }

  /* Filter panel */
  .filter-panel { padding: 0 16px 12px; }

  .filter-panel input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .filter-panel input:focus { border-color: var(--accent); }
  .filter-panel input::placeholder { color: var(--text3); }

  .filter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .tag:hover, .tag.active { border-color: var(--accent); color: var(--accent); }

  /* Available ports */
  .ports-panel { padding: 0 16px 16px; flex: 1; overflow-y: auto; }

  .port-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }
  .port-item:hover { border-color: var(--accent2); background: rgba(0,212,255,0.04); }
  .port-item .port-name { font-size: 11px; color: var(--text); }
  .port-item .port-desc { font-size: 10px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Terminal ─────────────────────────────────────────────────────── */
  .terminal-wrap {
    grid-area: terminal;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .terminal-toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    height: 34px;
    flex-shrink: 0;
  }

  .toolbar-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .toolbar-btn:hover { border-color: var(--accent2); color: var(--accent); }

  .toolbar-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
  }

  .toggle-switch {
    width: 28px; height: 15px;
    background: var(--border2);
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-switch.on { background: var(--accent2); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.2s;
  }
  .toggle-switch.on::after { transform: translateX(13px); }

  .toggle-label { font-size: 10px; color: var(--text2); letter-spacing: 0.08em; }

  .line-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text3);
  }

  /* Terminal output */
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    scroll-behavior: smooth;
    position: relative;
  }

  #terminal::-webkit-scrollbar { width: 6px; }
  #terminal::-webkit-scrollbar-track { background: var(--bg); }
  #terminal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  #terminal::-webkit-scrollbar-thumb:hover { background: var(--dim); }

  .log-line {
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 0;
    padding: 1px 14px;
    transition: background 0.1s;
    align-items: baseline;
  }
  .log-line:hover { background: rgba(255,255,255,0.02); }

  .log-line.new-line {
    animation: slide-in 0.15s ease-out;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .line-num {
    font-size: 10px;
    color: var(--text3);
    user-select: none;
    text-align: right;
    padding-right: 12px;
    padding-top: 1px;
  }

  .line-content {
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
    white-space: pre-wrap;
  }

  .line-content .ts {
    color: var(--text3);
    margin-right: 8px;
    font-size: 10px;
  }

  .line-content.highlight { color: var(--yellow); }
  .line-content .match { background: rgba(255,215,0,0.2); color: var(--yellow); border-radius: 1px; padding: 0 1px; }

  /* Scan line effect */
  .terminal-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }

  .empty-icon {
    font-size: 32px;
    opacity: 0.4;
  }

  .empty-text { font-size: 12px; letter-spacing: 0.05em; }

  /* ── Footer ───────────────────────────────────────────────────────── */
  footer {
    grid-area: footer;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 16px;
    font-size: 10px;
    color: var(--text3);
  }

  .footer-item { display: flex; align-items: center; gap: 5px; }
  .footer-item span.val { color: var(--text2); }

  #uptime-display { font-variant-numeric: tabular-nums; }

  /* ── Notification toast ───────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 48px;
    right: 20px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
    border-radius: 2px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.err { border-left-color: var(--red); }

  /* ── Scrollbar for aside ──────────────────────────────────────────── */
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">Serial Monitor</span>
    </div>
    <div class="header-sep"></div>
    <span class="header-info">BlueOS Extension · UART Terminal</span>

    <div class="header-right">
      <div class="ws-indicator">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">Connecting…</span>
      </div>
    </div>
  </header>

  <!-- ── Sidebar ────────────────────────────────────────────────────── -->
  <aside>
    <div class="section-title">Connection</div>
    <div class="conn-panel">
      <div class="field">
        <label>Serial Port</label>
        <select id="portSelect">
          <option value="/dev/ttyAMA0">/dev/ttyAMA0</option>
          <option value="/dev/ttyUSB0">/dev/ttyUSB0</option>
          <option value="/dev/ttyUSB1">/dev/ttyUSB1</option>
          <option value="/dev/serial0">/dev/serial0</option>
        </select>
      </div>
      <div class="field">
        <label>Baud Rate</label>
        <select id="baudSelect">
          <option>9600</option>
          <option>19200</option>
          <option>38400</option>
          <option>57600</option>
          <option value="115200" selected>115200</option>
          <option>230400</option>
          <option>460800</option>
          <option>921600</option>
        </select>
      </div>
      <button class="btn" onclick="applyConfig()">▶ APPLY CONFIG</button>
    </div>

    <div class="section-title">Status</div>
    <div class="status-panel">
      <div class="stat-row">
        <span class="stat-label">Serial</span>
        <span class="stat-value" id="statSerial">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Lines</span>
        <span class="stat-value" id="statLines">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Bytes</span>
        <span class="stat-value" id="statBytes">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Clients</span>
        <span class="stat-value" id="statClients">1</span>
      </div>
    </div>

    <div class="section-title">Filter</div>
    <div class="filter-panel">
      <input type="text" id="filterInput" placeholder="regex or keyword…" oninput="applyFilter()">
      <div class="filter-tags">
        <span class="tag" onclick="setTag(this,'ERROR')">ERROR</span>
        <span class="tag" onclick="setTag(this,'WARN')">WARN</span>
        <span class="tag" onclick="setTag(this,'INFO')">INFO</span>
        <span class="tag" onclick="setTag(this,'DEBUG')">DEBUG</span>
      </div>
      <button class="btn danger" style="margin-top:10px" onclick="clearTerminal()">✕ CLEAR</button>
    </div>

    <div class="section-title">Available Ports</div>
    <div class="ports-panel" id="portsList">
      <span style="font-size:11px;color:var(--text3)">Scanning…</span>
    </div>
  </aside>

  <!-- ── Terminal ───────────────────────────────────────────────────── -->
  <div class="terminal-wrap">
    <div class="terminal-toolbar">
      <button class="toolbar-btn" onclick="scrollToBottom()">↓ BOTTOM</button>
      <button class="toolbar-btn" onclick="exportLog()">⬇ EXPORT</button>
      <div class="toolbar-toggle" onclick="toggleTimestamps()">
        <div class="toggle-switch on" id="tsToggle"></div>
        <span class="toggle-label">TIMESTAMPS</span>
      </div>
      <div class="toolbar-toggle" onclick="toggleAutoscroll()">
        <div class="toggle-switch on" id="asToggle"></div>
        <span class="toggle-label">AUTOSCROLL</span>
      </div>
      <span class="line-count" id="lineCount">0 lines</span>
    </div>

    <div id="terminal">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-text">Waiting for serial data…</div>
      </div>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <footer>
    <div class="footer-item">PORT <span class="val" id="footPort">—</span></div>
    <div class="footer-item">BAUD <span class="val" id="footBaud">—</span></div>
    <div class="footer-item">UPTIME <span class="val" id="uptime-display">—</span></div>
    <div class="footer-item" style="margin-left:auto">BlueOS Serial Monitor v1.0.0</div>
  </footer>

</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ws = null
let lines = []         // all lines
let filteredLines = [] // lines after filter
let filterRe = null
let showTimestamps = true
let autoScroll = true
let wsConnected = false
let lineCounter = 0
let startTime = Date.now()

const terminal = document.getElementById('terminal')
const emptyState = document.getElementById('emptyState')

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws'
  ws = new WebSocket(`${proto}://${location.host}/ws`)

  ws.onopen = () => {
    setWsState(true)
  }

  ws.onclose = () => {
    setWsState(false)
    setTimeout(connect, 2000)
  }

  ws.onerror = () => {
    setWsState(false)
  }

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data)
    handleMessage(msg)
  }

  // Keepalive
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping')
  }, 10000)
}

function setWsState(on) {
  wsConnected = on
  const dot = document.getElementById('wsDot')
  const label = document.getElementById('wsLabel')
  dot.className = 'ws-dot' + (on ? ' on' : ' err')
  label.textContent = on ? 'Connected' : 'Reconnecting…'
}

function handleMessage(msg) {
  if (msg.type === 'init') {
    updateStatus(msg.status)
    lines = msg.history || []
    rebuildTerminal()
    return
  }
  if (msg.type === 'status') {
    updateStatus(msg)
    return
  }
  if (msg.type === 'line') {
    lines.push(msg)
    appendLine(msg, true)
    return
  }
  if (msg.type === 'clear') {
    lines = []
    filteredLines = []
    terminal.innerHTML = ''
    terminal.appendChild(emptyState)
    updateLineCount()
    return
  }
}

// ── Terminal rendering ─────────────────────────────────────────────────────
function rebuildTerminal() {
  // Remove all line elements, keep emptyState
  [...terminal.querySelectorAll('.log-line')].forEach(el => el.remove())
  filteredLines = []

  lines.forEach(l => {
    if (matchesFilter(l.raw)) {
      filteredLines.push(l)
      renderLine(l, false)
    }
  })

  updateEmptyState()
  updateLineCount()
  if (autoScroll) scrollToBottom()
}

function appendLine(line, animated) {
  if (!matchesFilter(line.raw)) return
  filteredLines.push(line)
  renderLine(line, animated)
  updateEmptyState()
  updateLineCount()
  if (autoScroll) scrollToBottom()
}

function renderLine(line, animated) {
  const row = document.createElement('div')
  row.className = 'log-line' + (animated ? ' new-line' : '')
  row.dataset.idx = line.index

  const num = document.createElement('div')
  num.className = 'line-num'
  num.textContent = line.index

  const content = document.createElement('div')
  content.className = 'line-content'

  if (showTimestamps) {
    const ts = document.createElement('span')
    ts.className = 'ts'
    ts.textContent = line.timestamp.slice(11, 23) // HH:MM:SS.mmm
    content.appendChild(ts)
  }

  const text = document.createTextNode(highlightMatch(line.raw))
  // Use innerHTML for highlight spans
  content.innerHTML += renderHighlighted(line.raw)

  row.appendChild(num)
  row.appendChild(content)
  terminal.appendChild(row)
}

function renderHighlighted(text) {
  if (!filterRe) return escapeHtml(text)
  return escapeHtml(text).replace(filterRe, m => `<span class="match">${m}</span>`)
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function highlightMatch(text) { return text } // raw text, highlighting done in renderHighlighted

function updateEmptyState() {
  if (filteredLines.length > 0) {
    emptyState.style.display = 'none'
  } else {
    emptyState.style.display = 'flex'
    terminal.appendChild(emptyState)
  }
}

function updateLineCount() {
  const total = lines.length
  const filtered = filteredLines.length
  document.getElementById('lineCount').textContent =
    filterRe ? `${filtered}/${total} lines` : `${total} lines`
  document.getElementById('statLines').textContent = total
}

// ── Filter ─────────────────────────────────────────────────────────────────
function applyFilter() {
  const val = document.getElementById('filterInput').value.trim()
  try {
    filterRe = val ? new RegExp(val, 'gi') : null
  } catch {
    filterRe = null
  }
  rebuildTerminal()
}

function matchesFilter(text) {
  if (!filterRe) return true
  filterRe.lastIndex = 0
  return filterRe.test(text)
}

function setTag(el, text) {
  const input = document.getElementById('filterInput')
  if (el.classList.contains('active')) {
    el.classList.remove('active')
    input.value = ''
  } else {
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'))
    el.classList.add('active')
    input.value = text
  }
  applyFilter()
}

// ── Config ─────────────────────────────────────────────────────────────────
async function applyConfig() {
  const port = document.getElementById('portSelect').value
  const baud = parseInt(document.getElementById('baudSelect').value)
  try {
    const res = await fetch('/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ port, baud }),
    })
    if (res.ok) toast(`Config applied: ${port} @ ${baud}`)
    else toast('Failed to apply config', true)
  } catch(e) {
    toast('Network error', true)
  }
}

// ── Status update ──────────────────────────────────────────────────────────
function updateStatus(s) {
  const serial = document.getElementById('statSerial')
  if (s.connected) {
    serial.textContent = 'ONLINE'
    serial.className = 'stat-value ok'
  } else {
    serial.textContent = s.error ? 'ERROR' : 'OFFLINE'
    serial.className = 'stat-value ' + (s.error ? 'err' : 'warn')
  }
  if (s.port) {
    document.getElementById('footPort').textContent = s.port
    document.getElementById('footBaud').textContent = s.baud
    // Sync selects
    const ps = document.getElementById('portSelect')
    const bs = document.getElementById('baudSelect')
    ;[...ps.options].forEach(o => { if (o.value === s.port) o.selected = true })
    ;[...bs.options].forEach(o => { if (o.value == s.baud) o.selected = true })
  }
}

// ── Controls ───────────────────────────────────────────────────────────────
function scrollToBottom() {
  terminal.scrollTop = terminal.scrollHeight
}

function toggleAutoscroll() {
  autoScroll = !autoScroll
  document.getElementById('asToggle').className = 'toggle-switch' + (autoScroll ? ' on' : '')
}

function toggleTimestamps() {
  showTimestamps = !showTimestamps
  document.getElementById('tsToggle').className = 'toggle-switch' + (showTimestamps ? ' on' : '')
  rebuildTerminal()
}

async function clearTerminal() {
  await fetch('/history', { method: 'DELETE' })
}

function exportLog() {
  const text = lines.map(l => `[${l.timestamp}] ${l.raw}`).join('\n')
  const blob = new Blob([text], { type: 'text/plain' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = `serial_log_${new Date().toISOString().slice(0,19)}.txt`
  a.click()
  toast('Log exported')
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer = null
function toast(msg, err = false) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'show' + (err ? ' err' : '')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => { el.className = '' }, 3000)
}

// ── Available ports ────────────────────────────────────────────────────────
async function loadPorts() {
  try {
    const res = await fetch('/ports')
    const data = await res.json()
    const container = document.getElementById('portsList')
    if (data.ports.length === 0) {
      container.innerHTML = '<span style="font-size:11px;color:var(--text3)">No ports found</span>'
      return
    }
    container.innerHTML = data.ports.map(p => `
      <div class="port-item" onclick="selectPort('${p.device}')">
        <div>
          <div class="port-name">${p.device}</div>
          <div class="port-desc">${p.description}</div>
        </div>
      </div>
    `).join('')
  } catch {}
}

function selectPort(dev) {
  const ps = document.getElementById('portSelect')
  // Add option if not exists
  if (![...ps.options].some(o => o.value === dev)) {
    ps.appendChild(new Option(dev, dev))
  }
  ps.value = dev
  toast(`Port selected: ${dev}`)
}

// ── Stats polling ──────────────────────────────────────────────────────────
async function pollStats() {
  try {
    const res = await fetch('/status')
    const data = await res.json()
    document.getElementById('statBytes').textContent = formatBytes(data.total_bytes)
    document.getElementById('uptime-display').textContent = formatUptime(data.uptime_seconds)
  } catch {}
}

function formatBytes(n) {
  if (n < 1024) return n + ' B'
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB'
  return (n/1048576).toFixed(2) + ' MB'
}

function formatUptime(s) {
  const h = Math.floor(s/3600)
  const m = Math.floor((s%3600)/60)
  const sec = Math.floor(s%60)
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
}

// ── Boot ───────────────────────────────────────────────────────────────────
connect()
loadPorts()
setInterval(pollStats, 2000)
setInterval(loadPorts, 10000)
</script>
